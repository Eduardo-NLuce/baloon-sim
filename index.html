<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAG-NET // Simulador de Campo Vectorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="field-canvas"></canvas>

    <div id="hud-container">
        <div class="hud-header">
            <h2>MAG_FIELD_SIM // ONLINE</h2>
            <p id="poles-counter">POLOS ACTIVOS: 2 / 10</p>
        </div>

        <hr class="hud-divider">
        <p class="hud-instruction">> HAZ CLIC EN EL LIENZO PARA AGREGAR O MOVER POLOS</p>
        <hr class="hud-divider">

        <div class="control-group">
            <label class="hud-label">CANTIDAD DE LÍNEAS (<span id="val-lineas">150</span>)</label>
            <input type="range" id="slider-lineas" min="25" max="500" step="5" value="150">
        </div>

        <div class="control-group">
            <label class="hud-label">INTENSIDAD DE FUERZA (<span id="val-fuerza">500</span>)</label>
            <input type="range" id="slider-fuerza" min="100" max="2000" step="50" value="500">
        </div>

        <div class="control-group">
            <label class="hud-label">DECAIMIENTO DE FUERZA (<span id="val-decaimiento">2.0</span>)</label>
            <input type="range" id="slider-decaimiento" min="1.0" max="3.5" step="0.1" value="2.0">
        </div>

        <div class="control-group">
            <label class="hud-label">TWIST / TORSIÓN (<span id="val-twist">0.0</span>)</label>
            <input type="range" id="slider-twist" min="-2.0" max="2.0" step="0.1" value="0.0">
        </div>

        <button id="btn-clear" class="hud-button">RESETEAR MATRIZ</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
